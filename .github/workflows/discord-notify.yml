name: Discord notify on push

on:
    push: {}
    workflow_dispatch: {}

jobs:
    notify:
        runs-on: [self-hosted, Linux, X64]

        steps:
            - name: Build message body
              env:
                    MSG: |
                        📦 Push to ${{ github.ref_name }} by ${{ github.actor }}: ${{ github.sha }}
                        ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
              run: |
                    if [ -z "${MSG// }" ]; then echo "Message is empty"; exit 1; fi
                    python3 - <<'PY' > body.json
                    import json, os
                    print(json.dumps({"content": os.environ["MSG"].strip()}))
                    PY
                    echo "Body:"
                    cat body.json

            - name: Post to Discord
              env:
                    DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
              run: |
                    curl -i -H "Content-Type: application/json" -d @body.json "$DISCORD_WEBHOOK"
