services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ./ollama-data:/root/.ollama
      #- ./startup/Modelfile:/root/.ollama/Modelfile:ro
    ports:
      - "2011:11434"
    networks:
     - billnet
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  agents:
    build:
      context: .
      dockerfile: startup/Dockerfile.agents
    image: agent-image # Just the name, not the actual image
    container_name: agents
    ports:
      - "2017:8000"
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./attack/main.py:/main.py
      - ./attack/ipaddr.py:/ipaddr.py
      - ./attack/network.py:/network.py
      - ./attack/packet.py:/packet.py
      - ./attack/payload.py:/payload.py
      - ${DOCKER_SOCK}:/var/run/docker.sock
      - ${WORKDIR}:/executor
    networks:
      - billnet
    depends_on:
      - mysql
    environment:
      - SSL_CERT_FILE=/usr/local/share/ca-certificates/billnet-ca.crt #this solved everything (forcing agents to trust this cert)
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASS=pass
      - DB_NAME=billdb
      - HOST_WORKDIR=${WORKDIR}
      - DOCKER_HOST=unix:///var/run/docker.sock
      - DATABASE_URL=mysql+pymysql://root:pass@mysql:3306/billdb?ssl_ca=/etc/ssl/certs/ca-certificates.crt #added ssl string at end
    restart: unless-stopped

  webui:
    image: ghcr.io/open-webui/open-webui:main
    build:
      context: .
      dockerfile: startup/Dockerfile.webui
    container_name: webui
    ports:
      - "2010:8080"
    networks: 
      - billnet
    volumes:
      - ./webui-data:/app/backend/data
      - ./startup/webui.db:/app/backend/data/webui.db
      #attaching themes below
      - ./themes:/app/backend/open_webui/static:ro
    environment:
      - WEBUI_AUTH=True
      - ENABLE_LOGIN_FORM=True
      - ENABLE_SIGNUP=False
      - ENABLE_FORWARD_USER_INFO_HEADERS=True
      - WEBUI_PORT=8080
      - WEBUI_HOST=0.0.0.0
      - OPENAI_API_BASE_URL=https://agents:8000/v1 #added s on the end here
      - ENABLE_TITLE_GENERATION=False
      - ENABLE_FOLLOW_UP_GENERATION=False
      - ENABLE_AUTOCOMPLETE_GENERATION=False
      - ENABLE_EVALUATION_ARENA_MODEL=False
      - ENABLE_TAGS_GENERATION=False
      - ENABLE_OLLAMA_API=False
    depends_on:
      - ollama
      - agents
    restart: unless-stopped

  kali:
    build:
      context: .
      dockerfile: startup/Dockerfile.kali
    image: kali-image # Just the name, not the actual image
    container_name: kali
    stdin_open: true
    tty: true
    networks: 
      - billnet

  mysql:
    build:
      context: ./startup
      dockerfile: Dockerfile.database
    image: sql-image
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: pass
    ports:
      - 2018:3306
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./mysql-backups:/mysql-backups
    networks:
      - billnet

  # Services merged from kali-container/compose.yml
  blog:
    image: nginx:stable-alpine
    container_name: tedmed
    ports:
      - "2019:80"
    volumes:
      - ./startup/index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - billnet

  proxy:
    image: nginx:alpine
    container_name: proxy
    volumes:
      - ./startup/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./startup/certs/ollama-cert.pem:/etc/nginx/cert.pem:ro
      - ./startup/certs/ollama-key.pem:/etc/nginx/key.pem:ro
    networks:
      - billnet
    depends_on:
      - ollama
    restart: unless-stopped

networks:
  billnet:
    driver: bridge
