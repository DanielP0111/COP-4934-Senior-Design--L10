events {}

http {
    server {
        listen 11434;
        # Increase header sizes to be safe for proxying larger payloads
        client_max_body_size 10M;

        # Proxy model API calls to the ai-mock service
        location /v1/ {
            # proxy to ai-mock service (no variables so nginx uses the original request URI)
            proxy_pass http://ai-mock:11434;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Proxy orchestrator/webapp paths (if any) to the python container
        location /orchestrator/ {
            proxy_pass http://python-container:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Simple health endpoint to verify the proxy is up
        location = /health {
            return 200 '{"status":"ok","proxy":"nginx"}';
            add_header Content-Type application/json;
        }
    }
}
